version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marl_platform
      POSTGRES_USER: marl
      POSTGRES_PASSWORD: marl_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marl -d marl_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://marl:marl_secret_2024@db:5432/marl_platform
      SYNC_DATABASE_URL: postgresql+psycopg2://marl:marl_secret_2024@db:5432/marl_platform
    volumes:
      - ./backend/checkpoints:/app/checkpoints
      - ./backend/saved_maps:/app/saved_maps
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
